name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            archive: tar.gz
          - os: windows-latest
            asset_suffix: windows-x86_64
            archive: zip
          - os: macos-15-intel
            asset_suffix: macos-x86_64
            archive: tar.gz
          - os: macos-14
            asset_suffix: macos-arm64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    env:
      ASSET_SUFFIX: ${{ matrix.asset_suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "tag/version mismatch: tag=${GITHUB_REF_NAME} expected=${expected_tag}" >&2
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix asset
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="ustc-107-ssh-${tag}-${ASSET_SUFFIX}"
          mkdir -p "dist/${asset}"
          cp target/release/ustc-107-ssh "dist/${asset}/"
          cp README.md "dist/${asset}/"
          cp LICENSE "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          (cd dist && shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256")
          (cd dist && shasum -a 256 -c "${asset}.tar.gz.sha256")
          tar -tzf "dist/${asset}.tar.gz" | grep -Fx "${asset}/ustc-107-ssh"
          tar -tzf "dist/${asset}.tar.gz" | grep -Fx "${asset}/README.md"
          tar -tzf "dist/${asset}.tar.gz" | grep -Fx "${asset}/LICENSE"

      - name: Package Windows asset
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $asset = "ustc-107-ssh-$tag-$env:ASSET_SUFFIX"
          New-Item -ItemType Directory -Force -Path "dist/$asset" | Out-Null
          Copy-Item "target/release/ustc-107-ssh.exe" "dist/$asset/"
          Copy-Item "README.md" "dist/$asset/"
          Copy-Item "LICENSE" "dist/$asset/"
          Compress-Archive -Path "dist/$asset" -DestinationPath "dist/$asset.zip" -Force
          $hash = (Get-FileHash "dist/$asset.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset.zip" | Out-File -Encoding ascii "dist/$asset.zip.sha256"
          $actual = (Get-FileHash "dist/$asset.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $hash) { throw "checksum verification failed for $asset.zip" }
          Expand-Archive -Path "dist/$asset.zip" -DestinationPath "dist/verify-$asset" -Force
          @("ustc-107-ssh.exe", "README.md", "LICENSE") | ForEach-Object {
            if (-not (Test-Path "dist/verify-$asset/$asset/$_")) {
              throw "missing archive member: $asset/$_"
            }
          }

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -maxdepth 1 -type f -print | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
